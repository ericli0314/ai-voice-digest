<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI語音 &amp; Agent 趨勢每日報</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
               background: #f0f2f5; color: #333; }
        .header { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
                  color: white; padding: 3rem 1.5rem; text-align: center; }
        .header h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .sub { opacity: 0.65; font-size: 0.9rem; margin-top: 0.4rem; }
        .tags { margin-top: 1rem; display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: center; }
        .tag { background: rgba(255,255,255,0.15); border-radius: 20px; padding: 3px 12px; font-size: 0.78rem; }
        .container { max-width: 700px; margin: 3rem auto; padding: 0 1rem; text-align: center; }
        .notice { background: white; border-radius: 12px; padding: 2rem;
                  box-shadow: 0 2px 12px rgba(0,0,0,0.08); color: #666; font-size: 0.95rem; line-height: 1.8; }
        .notice strong { color: #6366f1; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎙️ AI語音 &amp; Agent 趨勢每日報</h1>
        <div class="sub">每日自動追蹤產業最新動態，由 DeepSeek AI 摘要整理</div>
        <div class="tags">
            <span class="tag">Voice AI</span>
            <span class="tag">Voice Bot</span>
            <span class="tag">AI Agent</span>
            <span class="tag">Agentic AI</span>
            <span class="tag">AI客服</span>
            <span class="tag">Contact Center AI</span>
            <span class="tag">UCC / CCaaS</span>
        </div>
    </div>
    <div class="container">
        <div class="notice">
            <strong>⏳ 等待首次執行...</strong><br><br>
            每日報告將於 GitHub Actions 排程首次執行後出現在此頁面。<br>
            你也可以到 GitHub Repository 的 Actions 頁面手動觸發。
        </div>
    </div>
</body>
</html>
